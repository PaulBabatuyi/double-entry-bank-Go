# yaml-language-server: $schema=https://raw.githubusercontent.com/golangci/golangci-lint/master/.golangci.reference.yml
# golangci-lint configuration
# See https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gosec
    - gocritic
    - revive
  settings:
    errcheck:
      check-blank: true
    govet:
      enable-all: true
    gosec:
      excludes:
        - G404
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
      - path: postgres/sqlc/
        linters:
          - revive

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/PaulBabatuyi/double-entry-bank-Go

issues:
  max-issues-per-linter: 50
